<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Terminal</title>
</head>
<body>

    <main>
        <ul id="commandsDisplayer" class="commands-list">
            <li class="command string">Welcome to this web Terminal!</li>
            <li class="command string">Type `help` to see every command avaiable</li>
        </ul>
    </main>

    <div class="input-container">
        <span>$</span>
        <input id="commandInput" type="text" placeholder="Enter command here">
    </div>

    <script src="script.js"></script>
</body>
</html>
